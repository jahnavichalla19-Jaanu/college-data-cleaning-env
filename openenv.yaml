spec_version: 1
name: college-data-cleaning-env
version: "1.0.0"
type: http
description: >
  Real-world college student data cleaning environment for AI agent training.
  An agent receives messy student records and must clean them by removing
  duplicates, filling missing values, and fixing name formatting.

author: "Jahnavi"

tags:
  - openenv
  - data-cleaning
  - real-world

tasks:
  - id: easy
    description: "Remove duplicate student records based on ID"
    difficulty: easy
    max_attempts: 5
    scoring: "0.001-0.999 partial credit"

  - id: medium
    description: "Fill missing marks in student records"
    difficulty: medium
    max_attempts: 5
    scoring: "0.001-0.999 partial credit"

  - id: hard
    description: "Fix inconsistent name formatting in student records"
    difficulty: hard
    max_attempts: 5
    scoring: "0.001-0.999 partial credit"

observation_space:
  data: "list — current student records"
  message: "string — current environment message"

action_space:
  action_type: "string — remove_duplicates | fill_missing | fix_format"

reward:
  type: continuous
  range: [0.001, 0.999]
  shaping:
    - "+0.40 for remove_duplicates"
    - "+0.15 per missing mark filled"
    - "+0.30 for fix_format"

runtime:
  framework: FastAPI
  python: "3.11"
  docker: true
  hf_spaces: true
  port: 7860